services:
  rustdesk-api:
    ports:
      - 21114:21114
    environment:
      - RUSTDESK_API_RUSTDESK_ID_SERVER=192.168.1.66:21116
      - RUSTDESK_API_RUSTDESK_RELAY_SERVER=192.168.1.66:21117
      - RUSTDESK_API_RUSTDESK_API_SERVER=http://127.0.0.1:21114
      - RUSTDESK_API_RUSTDESK_KEY=123456789
      - RUSTDESK_API_RUSTDESK_PERSONAL=1
      - RUSTDESK_API_JWT_KEY=test-jwt-key-12345
      - RUSTDESK_API_LANG=en
      - RUSTDESK_API_GIN_MODE=debug
    volumes:
      - ./resources:/app/resources
      - ./data/rustdesk/api:/app/data
      - ./conf:/app/conf
