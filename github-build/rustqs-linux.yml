name: rustqs linux min test
# ============================================================================
# DRAFT (B-012) — НЕ ВАЛИДИРОВАН РЕАЛЬНЫМ ПРОГОНОМ GITHUB ACTIONS.
# Перенос generator-linux.yml в контракт форка (enc_payload + L1/L2/L3), по образцу
# github-build/rustqs-windows-min-test.yml. Build-шаги Flutter-Linux требуют доводки
# на реальных прогонах (vcpkg, движок, build.py, упаковка, пути артефактов) — как это
# делалось для windows-min-test. Бэкенд уже умеет диспетчить platform=linux сюда и
# забирать артефакт `rustdesk-min-test-linux`.
#
# Контракт параметров идентичен rustqs-windows-min-test:
#   enc_payload = base64(openssl aes-256-cbc -pbkdf2 -pass pass:$WORKFLOW_PAYLOAD_KEY)
#                 от JSON {server,key,app_name,custom_txt}; либо открытые inputs (debug).
#
# Путь в форке: .github/workflows/rustqs-linux.yml на ветке rustqs/min-test.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      enc_payload:
        description: 'Encrypted payload (base64 openssl aes-256-cbc -pbkdf2). Overrides open inputs below.'
        required: false
        type: string
        default: ''
      server:
        description: '[Debug] RustDesk server (rendezvous host:port). Ignored if enc_payload set.'
        required: false
        type: string
        default: ''
      key:
        description: '[Debug] RustDesk server public key (base64). Ignored if enc_payload set.'
        required: false
        type: string
        default: ''
      app_name:
        description: '[Debug] Brand name. Ignored if enc_payload set.'
        required: false
        type: string
        default: ''
      custom_txt:
        description: '[Debug] Base64 custom_.txt payload. Ignored if enc_payload set.'
        required: false
        type: string
        default: ''
      version:
        description: 'RustDesk version for offline assets (e.g. 1.4.8). Ignored if enc_payload set.'
        required: false
        type: string
        default: '1.4.8'

env:
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VERSION: "${{ inputs.version || '1.4.8' }}"

jobs:
  bridge:
    uses: ./.github/workflows/bridge.yml

  build:
    needs: [bridge]
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /opt/ghc /usr/local/lib/android /usr/share/dotnet
          df -h

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # Разрешение параметров: расшифровать enc_payload (prod) или взять открытые inputs (debug).
      # Идентично windows-min-test: на выходе env RQS_*, секреты замаскированы.
      - name: 'Resolve build config (decrypt or pass-through)'
        shell: bash
        env:
          ENC: ${{ inputs.enc_payload }}
          PAYLOAD_KEY: ${{ secrets.WORKFLOW_PAYLOAD_KEY }}
          IN_SERVER: ${{ inputs.server }}
          IN_KEY: ${{ inputs.key }}
          IN_APP: ${{ inputs.app_name }}
          IN_CT: ${{ inputs.custom_txt }}
          IN_VERSION: ${{ inputs.version }}
        run: |
          set -eu
          if [ -n "${ENC:-}" ]; then
            if [ -z "${PAYLOAD_KEY:-}" ]; then
              echo "::error::enc_payload provided but secret WORKFLOW_PAYLOAD_KEY is not set in this repo"
              exit 1
            fi
            decrypted=$(printf '%s' "$ENC" | base64 -d \
              | openssl enc -d -aes-256-cbc -pbkdf2 -pass "pass:${PAYLOAD_KEY}")
            RQS_SERVER=$(printf '%s' "$decrypted" | jq -r '.server // ""')
            RQS_KEY=$(printf '%s' "$decrypted" | jq -r '.key // ""')
            RQS_APP=$(printf '%s' "$decrypted" | jq -r '.app_name // ""')
            RQS_CT=$(printf '%s' "$decrypted" | jq -r '.custom_txt // ""')
            RQS_VERSION=$(printf '%s' "$decrypted" | jq -r '.version // ""')
          else
            RQS_SERVER="${IN_SERVER:-}"; RQS_KEY="${IN_KEY:-}"; RQS_APP="${IN_APP:-}"; RQS_CT="${IN_CT:-}"; RQS_VERSION="${IN_VERSION:-}"
          fi
          for v in "$RQS_KEY" "$RQS_CT"; do [ -n "$v" ] && echo "::add-mask::$v" || true; done
          {
            echo "RQS_SERVER=$RQS_SERVER"
            echo "RQS_KEY=$RQS_KEY"
            echo "RQS_APP_NAME=$RQS_APP"
            echo "RQS_CUSTOM_TXT=$RQS_CT"
            echo "RQS_VERSION=$RQS_VERSION"
          } >> "$GITHUB_ENV"

      # Override VERSION from encrypted payload (takes precedence over workflow-level default).
      - name: 'Override VERSION from dispatch payload'
        if: env.RQS_VERSION != ''
        shell: bash
        run: |
          echo "VERSION=$RQS_VERSION" >> "$GITHUB_ENV"
          echo "VERSION overridden from dispatch: $RQS_VERSION"

      # L1: вшить сервер+ключ в config.rs (платформо-независимо, идентично windows).
      - name: 'L1 inject: server + key into hbb_common/config.rs'
        if: env.RQS_SERVER != '' || env.RQS_KEY != ''
        shell: bash
        run: |
          set -eu
          f=libs/hbb_common/src/config.rs
          if [ -n "${RQS_SERVER:-}" ]; then
            esc=$(printf '%s' "$RQS_SERVER" | sed -e 's/[\/&]/\\&/g')
            sed -i "s/rs-ny\.rustdesk\.com/${esc}/" "$f"
            grep -F -q -- "$RQS_SERVER" "$f" || { echo "L1: server marker not found"; exit 1; }
          fi
          if [ -n "${RQS_KEY:-}" ]; then
            esc=$(printf '%s' "$RQS_KEY" | sed -e 's/[\/&]/\\&/g')
            sed -i "s|OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=|${esc}|" "$f"
            grep -F -q -- "$RQS_KEY" "$f" || { echo "L1: key marker not found"; exit 1; }
          fi

      # L2: allowCustom — снять проверку подписи custom.txt (платформо-независимо).
      - name: 'L2 patch: allowCustom'
        if: env.RQS_CUSTOM_TXT != ''
        shell: bash
        run: |
          set -eu
          python3 .github/patches/rdgen-allowCustom.py
          if grep -q '5Qbwsde3unUcJBtrx9ZkvUmwFNoExHzpryHuPUdqlWM=' src/common.rs; then
            echo "L2: allowCustom FAILED"; exit 1
          fi

      # L3: брендинг для Linux (без .exe/Runner.rc — только Cargo.toml/portable/lang).
      - name: 'L3 brand: rename RustDesk → app_name'
        if: env.RQS_APP_NAME != ''
        shell: bash
        run: |
          set -eu
          esc=$(printf '%s' "$RQS_APP_NAME" | sed -e 's/[\/&]/\\&/g')
          for f in Cargo.toml libs/portable/Cargo.toml; do
            sed -i -e "s|description = \"RustDesk Remote Desktop\"|description = \"${esc}\"|" "$f"
          done
          find ./src/lang -name "*.rs" -exec sed -i -e "s|RustDesk|${esc}|" {} \;

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Build dependencies (apt)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y nasm libva-dev libvdpau-dev imagemagick \
            libgtk-3-dev libxcb-randr0-dev libxdo-dev libxfixes-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libasound2-dev libpulse-dev \
            libpam0g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libunwind-dev libclang-dev llvm-dev \
            build-essential cmake ninja-build pkg-config \
            libssl-dev libayatana-appindicator3-dev wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"

      # 12 GB swap: ffmpeg/vcpkg + flutter build eat > 7 GB RAM на ubuntu-24.04 runner.
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c # v1.0
        with:
          swap-size-gb: 12

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ubuntu-24.04

      # Сборка только cdylib: экономит ~30% времени cargo (staticlib/rlib не нужны Flutter-у).
      - name: Disable rust bridge build
        run: |
          sed -i 's/\["cdylib", "staticlib", "rlib"\]/\["cdylib"\]/g' Cargo.toml

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          # libva-dev ставим заранее, иначе vcpkg-ffmpeg спотыкается на свежем ubuntu.
          sudo apt-get install -y libva-dev
          if ! "${VCPKG_ROOT}/vcpkg" install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-linux-rel-out.log" || true
        shell: bash

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # Flutter 3.24.5 без этого патча не фильтрует dropdown — падает в UI на первом клике.
      - name: Patch flutter
        if: env.FLUTTER_VERSION == '3.24.5'
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      # Двухстадийная сборка (как в upstream flutter-build.yml): сначала cargo lib
      # со всеми нужными фичами, затем build.py только для Flutter-UI + .deb.
      - name: Build rustdesk (Flutter Linux)
        run: |
          export VCPKG_ROOT=/opt/artifacts/vcpkg
          export CARGO_INCREMENTAL=0
          export DEB_ARCH=amd64
          cargo build --locked --lib --features hwcodec,flutter,unix-file-copy-paste --release
          python3 ./build.py --flutter --skip-cargo

      # L2 payload: положить custom_.txt рядом с бинарём в bundle (читается клиентом).
      - name: 'L2 payload: place custom_.txt into bundle'
        if: env.RQS_CUSTOM_TXT != ''
        shell: bash
        run: |
          set -eu
          dst=flutter/build/linux/x64/release/bundle/custom_.txt
          printf '%s' "$RQS_CUSTOM_TXT" > "$dst"
          ls -la "$dst"

      - name: Install rpm
        run: |
          # Долгий vcpkg-build (ffmpeg, 5-10 мин) мог состарить apt-кэш — обновим.
          sudo apt-get update -y
          sudo apt-get install -y rpm

      - name: Package artifact (.deb + .rpm)
        shell: bash
        env:
          HBB: ${{ github.workspace }}
        run: |
          set -eu
          APP_RAW="${RQS_APP_NAME:-rustdesk}"
          APP="$(printf '%s' "$APP_RAW" | tr -c 'A-Za-z0-9._+-' '-' | sed -e 's/^-*//' -e 's/-*$//')"
          [ -n "$APP" ] || APP=rustdesk
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p ./output

          # 1) .deb — создан build.py → build_flutter_deb()
          for pkg in rustdesk-*.deb; do
            [ -f "$pkg" ] || continue
            new_name="$(echo "$pkg" | sed "s/^rustdesk/${APP}/")"
            cp "$pkg" "./output/${new_name}"
            echo "::notice::DEB: $pkg → output/${new_name}"
          done

          # 2) .rpm — rpmbuild из того же flutter bundle
          if [ -d flutter/build/linux/x64/release/bundle ]; then
            sed -i "s/^Version:.*/Version:    ${VERSION}/" res/rpm-flutter.spec
            rpmbuild -ba res/rpm-flutter.spec
            rpm_file=$(find "$HOME/rpmbuild/RPMS" -name 'rustdesk-*.rpm' | head -1)
            if [ -n "$rpm_file" ]; then
              new_name="${APP}-${VERSION}-0.x86_64.rpm"
              cp "$rpm_file" "./output/${new_name}"
              echo "::notice::RPM: ${new_name}"
            fi
          fi

          ls -lh ./output/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-min-test-linux
          path: output
          if-no-files-found: error
